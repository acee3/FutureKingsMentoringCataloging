services:
  catalog-app:
    build:
      context: .
      dockerfile: Dockerfile.catalog-app
    container_name: fkm-catalog-app
    environment:
      DATABASE_PATH: /data/catalog.sqlite3
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TENANT_ID: ${TENANT_ID:-}
      CLIENT_ID: ${CLIENT_ID:-}
      CLIENT_SECRET_VALUE: ${CLIENT_SECRET_VALUE:-}
      SITE_HOSTNAME: ${SITE_HOSTNAME:-}
      SITE_PATH: ${SITE_PATH:-}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-text-embedding-3-small}
    ports:
      - "8000:8000"
    volumes:
      - sqlite-data:/data

volumes:
  sqlite-data:
